<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f5f4f0;
            --surface: #ffffff;
            --border: #ddd;
            --text: #1a1a1a;
            --muted: #888;
        }

        body {
            background: var(--bg);
            font-family: 'IBM Plex Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem 1rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
        }

        .tag {
            display: inline-block;
            font-size: 0.65rem;
            font-family: 'IBM Plex Mono', monospace;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            line-height: 1.3;
            margin-bottom: 0.6rem;
        }

        p {
            font-size: 0.85rem;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 1.5rem;
        }

        .meta {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .meta-row span:first-child {
            font-size: 0.72rem;
            font-family: 'IBM Plex Mono', monospace;
            color: var(--muted);
        }

        .meta-row span:last-child {
            font-size: 0.72rem;
            font-family: 'IBM Plex Mono', monospace;
            color: var(--text);
        }

        a.btn {
            display: block;
            width: 100%;
            padding: 0.65rem;
            background: var(--text);
            color: #fff;
            border-radius: 4px;
            font-size: 0.85rem;
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 500;
            text-align: center;
            text-decoration: none;
            letter-spacing: 0.04em;
            transition: opacity 0.15s;
        }

        a.btn:hover { opacity: 0.82; }
        a.btn:active { opacity: 0.7; }
    </style>
</head>
<body>
    <div class="card">
        <span class="tag">Algerian Forest Fire · ML</span>
        <h1>Algerian Forest Fire Predictor</h1>
        <p>Enter Temperature,RH  to predict expected Forest Fire</p>

        <div class="divider"></div>

        <div class="meta">
            <div class="meta-row">
                <span>Input Features</span>
                <span>5</span>
            </div>
            <div class="meta-row">
                <span>Model Type</span>
                <span>Regression</span>
            </div>
            <div class="meta-row">
                <span>Output</span>
                <span>Score (0 - 100)</span>
            </div>
        </div>

        <a class="btn" href="{{ url_for('predict_datapoint') }}">Start Prediction →</a>
    </div>
</body>
</html>
